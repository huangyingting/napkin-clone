<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Terra — exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box} body{margin:0;background:#0f1a12;padding:36px 0 64px}
.deck{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:26px}
.slide{position:relative;aspect-ratio:16/9;container-type:size;border-radius:22px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.pad{position:absolute;inset:0;padding:9cqh 7cqw;display:flex;flex-direction:column}
.kick{font:700 2.3cqh "Manrope";letter-spacing:.26em;text-transform:uppercase;color:#c2683f}
h1{font:600 12cqh/.96 "Fraunces";color:#1f2a22;margin:2cqh 0 0;letter-spacing:-.01em}
.sub{font:400 3cqh "Source Sans 3";color:#6f7d6c;margin-top:3cqh;max-width:52%}
.leaf{position:absolute;border-radius:50% 50% 50% 8%;background:#3f6b4a;right:-12cqw;top:-16cqh;width:55cqw;height:70cqh;transform:rotate(12deg)}
.leaf2{position:absolute;border-radius:50% 8% 50% 50%;background:#cdd9c4;right:6cqw;top:18cqh;width:34cqw;height:46cqh;opacity:.6}
.photo{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1600&q=80') center/cover}
.row{display:flex;gap:2.5cqw;margin-top:auto}.c{flex:1;border-radius:5cqmin;background:#e4ece0;padding:3.4cqh 2.4cqw}.c b{font:600 6cqh "Fraunces";color:#3f6b4a}.c p{font:400 2.3cqh "Source Sans 3";color:#37463a;margin-top:.8cqh}
.tag{align-self:flex-start;margin-top:auto;background:#3f6b4a;color:#fff;border-radius:999px;padding:1.4cqh 2.6cqh;font:700 2.2cqh "Manrope"}
</style></head><body><div class="deck">
<div class="slide" style="background:#f4f6f0"><div class="leaf"></div><div class="leaf2"></div><div class="pad"><span class="kick">Impact Report · 2026</span><h1>Growing what<br/>we measure</h1><p class="sub">A year of regenerative progress, in the open.</p><span class="tag">Terra</span></div></div>
<div class="slide"><div class="photo"></div><div class="pad" style="justify-content:flex-end"><h1 style="color:#fff;font-size:8cqh">118k tonnes CO₂e</h1><p class="sub" style="color:#eafce8">removed and verified this year.</p></div></div>
<div class="slide" style="background:#f4f6f0"><div class="pad"><span class="kick">Where we stand</span><h1 style="font-size:6cqh">Measure, restore, repeat</h1><div class="row"><div class="c"><b>14,200</b><p>acres managed</p></div><div class="c"><b>31%</b><p>soil-carbon gain</p></div><div class="c"><b>100%</b><p>renewable</p></div></div></div></div>
</div></body></html>
