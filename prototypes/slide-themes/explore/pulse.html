<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Pulse — exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Anton&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box} body{margin:0;background:#0d0a0f;padding:36px 0 64px}
.deck{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:26px}
.slide{position:relative;aspect-ratio:16/9;container-type:size;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.pad{position:absolute;inset:0;padding:8cqh 7cqw;display:flex;flex-direction:column}
.kick{font:700 2.4cqh "Space Grotesk";letter-spacing:.26em;text-transform:uppercase;color:#ec2d6f}
h1{font:400 16cqh/.86 "Anton";color:#190a14;letter-spacing:.01em;margin:1cqh 0 0;text-transform:uppercase}
.sub{font:600 3cqh "Manrope";color:#9a6f84;margin-top:3cqh;max-width:50%}
.wedge{position:absolute;width:60cqw;height:120cqh;right:-10cqw;top:-10cqh;background:linear-gradient(135deg,#ff7a18,#ec2d6f 60%,#7b2ff7);transform:rotate(14deg);border-radius:8cqmin}
.orb{position:absolute;border-radius:50%;filter:blur(2cqmin)}
.stat{font:400 34cqh "Anton";color:#ec2d6f}
.holo{position:absolute;width:46cqw;height:46cqw;right:8cqw;bottom:-8cqh;border-radius:6cqmin;background:linear-gradient(135deg,#7b2ff7,#22d3ee,#ec2d6f,#ff7a18);transform:rotate(18deg);filter:blur(.4cqmin);opacity:.9}
.tag{align-self:flex-start;margin-top:auto;background:#190a14;color:#fff;border-radius:999px;padding:1.4cqh 2.6cqh;font:700 2.2cqh "Manrope"}
</style></head><body><div class="deck">
<div class="slide"><div class="wedge"></div><div class="orb" style="width:18cqw;height:18cqw;right:14cqw;bottom:14cqh;background:#7b2ff7"></div><div class="pad"><span class="kick">Launch 2026</span><h1>Move at the<br/>speed of want</h1><p class="sub">The growth engine for ambitious brands.</p><span class="tag">PULSE</span></div></div>
<div class="slide" style="background:#190a14"><div class="holo"></div><div class="pad"><span class="kick">Average Result</span><div class="stat">+212%</div><p class="sub" style="color:#ffb3cd">qualified pipeline in ninety days.</p></div></div>
<div class="slide" style="background:linear-gradient(135deg,#ec2d6f,#ff7a18)"><div class="pad" style="justify-content:center"><h1 style="color:#fff;font-size:18cqh">Ready? Go.</h1><p class="sub" style="color:#fff;opacity:.85">hello@pulse.co</p></div></div>
</div></body></html>
