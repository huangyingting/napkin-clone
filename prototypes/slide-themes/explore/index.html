<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Theme explorations — gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Sans+3:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,500&family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #0b0c10; color: #e7e8ec; font-family: "Inter", system-ui, sans-serif; padding: 40px 0 80px; }
      header { max-width: 1180px; margin: 0 auto 32px; padding: 0 24px; }
      h1 { font-family: "Space Grotesk", sans-serif; font-size: 30px; margin: 0 0 6px; letter-spacing: -0.02em; }
      header p { color: #9aa0ac; margin: 0; font-size: 14px; }
      .grid { max-width: 1180px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 26px; }
      a.card { text-decoration: none; color: inherit; }
      .frame { aspect-ratio: 16/9; border-radius: 14px; overflow: hidden; box-shadow: 0 16px 44px rgba(0,0,0,.5); }
      .frame iframe { width: 200%; height: 200%; border: 0; transform: scale(.5); transform-origin: top left; pointer-events: none; }
      .name { margin-top: 12px; font-size: 16px; font-weight: 600; }
      .name span { color: #8b909b; font-weight: 400; }
      a.card:hover .frame { outline: 2px solid #7c9cff; }
    </style>
  </head>
  <body>
    <header>
      <h1>Theme explorations</h1>
      <p>Hand-built master decks · gradients, mesh light, geometry, mixed type</p>
    </header>
    <main class="grid">
      <a class="card" href="aurora.html"><div class="frame"><iframe src="aurora.html"></iframe></div><div class="name">Aurora <span>· tech keynote</span></div></a>
      <a class="card" href="noir.html"><div class="frame"><iframe src="noir.html"></iframe></div><div class="name">Noir <span>· pitch deck</span></div></a>
      <a class="card" href="pulse.html"><div class="frame"><iframe src="pulse.html"></iframe></div><div class="name">Pulse <span>· marketing</span></div></a>
      <a class="card" href="ocean.html"><div class="frame"><iframe src="ocean.html"></iframe></div><div class="name">Ocean <span>· product/data</span></div></a>
      <a class="card" href="terra.html"><div class="frame"><iframe src="terra.html"></iframe></div><div class="name">Terra <span>· sustainability</span></div></a>
      <a class="card" href="editorial.html"><div class="frame"><iframe src="editorial.html"></iframe></div><div class="name">Editorial <span>· brand story</span></div></a>
      <a class="card" href="monolith.html"><div class="frame"><iframe src="monolith.html"></iframe></div><div class="name">Monolith <span>· consulting</span></div></a>
      <a class="card" href="clarity.html"><div class="frame"><iframe src="clarity.html"></iframe></div><div class="name">Clarity <span>· business</span></div></a>
    </main>
  </body>
</html>
