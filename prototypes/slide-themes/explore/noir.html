<style>
*{box-sizing:border-box} body{margin:0;background:#050608;padding:36px 0 64px}
.deck{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:26px}

.pad{position:absolute;inset:0;padding:9cqh 7cqw;display:flex;flex-direction:column}
.kick{font:700 2.3cqh "Manrope";letter-spacing:.3em;text-transform:uppercase;color:#f5b301}
.ring{position:absolute;border-radius:50%;border:18cqmin solid #1b1f2b;right:-22cqw;top:8cqh;width:64cqw;height:64cqw;box-shadow:0 0 24cqmin #f5b30133;}
h1{font:800 12cqh/.94 "Archivo";color:#f2f3f5;letter-spacing:-.03em;margin:2cqh 0 0}
.sub{font:400 3cqh "Inter";color:#8b909b;margin-top:3cqh;max-width:54%}
.tag{align-self:flex-start;margin-top:auto;border:1px solid #2a2f3d;border-radius:999px;padding:1.4cqh 2.4cqh;font:600 2.2cqh "Inter";color:#cfd3dc}
.stat{font:800 30cqh "Archivo";color:#f5b301;letter-spacing:-.04em}
.row{display:flex;gap:2.5cqw;margin-top:4cqh}.c{flex:1;border-radius:3cqmin;background:#11141d;border:1px solid #1d2230;padding:3.5cqh 2.4cqw}.c b{font:800 3.6cqh "Archivo";color:#f5b301}.c p{font:400 2.4cqh "Inter";color:#9aa0ac;margin:1.2cqh 0 0}
.dot{display:inline-block;width:1.1cqh;height:1.1cqh;border-radius:50%;background:#f5b301;margin-right:1.1cqh}
</style></head><body><div class="deck">
<div class="slide" style="background:radial-gradient(120% 90% at 95% 10%, #14171f, #050608 60%)"><div class="ring"></div><div class="pad"><span class="kick">Series A · Confidential</span><h1>The category<br/>defining bet</h1><p class="sub">Infrastructure for the autonomous enterprise.</p><span class="tag"><span class="dot"></span>NOIR · 2026</span></div></div>

</div></body></html>
