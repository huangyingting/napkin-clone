<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Monolith — exploration</title>

<style>
*{box-sizing:border-box} body{margin:0;background:#1a0c0e;padding:36px 0 64px}
.deck{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:26px}

.rule{height:.5cqh;width:16cqw;background:#e8b4a0;margin:3cqh 0}
.foot{margin-top:auto;display:flex;justify-content:space-between;font:600 2.2cqh "IBM Plex Sans";color:#f0c9c0}
.row{display:flex;gap:2.5cqw;margin-top:auto}.c{flex:1;border-top:.6cqh solid #e8b4a0;padding-top:2.4cqh}.c b{font:800 6cqh "Archivo";color:#fff}.c p{font:400 2.4cqh "IBM Plex Sans";color:#f0c9c0;margin-top:1cqh}
