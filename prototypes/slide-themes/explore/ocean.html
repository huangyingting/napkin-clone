<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Ocean — exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box} body{margin:0;background:#05161f;padding:36px 0 64px}
.deck{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:26px}
.slide{position:relative;aspect-ratio:16/9;container-type:size;border-radius:16px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.55)}
.pad{position:absolute;inset:0;padding:9cqh 7cqw;display:flex;flex-direction:column}
.kick{font:700 2.3cqh "Space Grotesk";letter-spacing:.28em;text-transform:uppercase;color:#7dd3fc}
h1{font:700 12cqh/.92 "Space Grotesk";letter-spacing:-.02em;color:#fff;margin:2cqh 0 0}
.sub{font:400 3cqh "Inter";color:#bae6fd;margin-top:3cqh;max-width:52%}
.orb{position:absolute;border-radius:50%;filter:blur(7cqmin);opacity:.5}
.photo{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1505816014357-96b5ff457e9a?w=1600&q=80') center/cover}
.scrim{position:absolute;inset:0;background:linear-gradient(90deg,#05161fdd 40%,#05161f55)}
.row{display:flex;gap:2.5cqw;margin-top:auto}.c{flex:1;border-radius:3cqmin;background:#ffffff12;border:1px solid #ffffff22;padding:3.4cqh 2.4cqw;backdrop-filter:blur(6px)}.c b{font:800 6cqh "Space Grotesk";color:#7dd3fc}.c p{font:400 2.3cqh "Inter";color:#cfeefe;margin-top:.8cqh}
.tag{align-self:flex-start;margin-top:auto;background:#ffffff14;border:1px solid #ffffff2a;border-radius:999px;padding:1.4cqh 2.6cqh;font:600 2.2cqh "Inter";color:#e0f6ff}
</style></head><body><div class="deck">
<div class="slide" style="background:radial-gradient(120% 120% at 85% -10%,#0e4d6e,#05161f 60%)"><div class="orb" style="width:50cqw;height:50cqw;right:-8cqw;top:-12cqh;background:#38bdf8"></div><div class="orb" style="width:40cqw;height:40cqw;right:10cqw;top:36cqh;background:#99f6e4"></div><div class="pad"><span class="kick">Product Review · 2026</span><h1>Navigate with<br/>better signals</h1><p class="sub">A calm operating view for product, customer, and market data.</p><span class="tag">Ocean</span></div></div>
<div class="slide"><div class="photo"></div><div class="scrim"></div><div class="pad"><span class="kick">Signals below the surface</span><h1 style="font-size:7cqh">+11 pts retention</h1><div class="row"><div class="c"><b>+18%</b><p>activation</p></div><div class="c"><b>141%</b><p>NRR</p></div><div class="c"><b>3.2×</b><p>velocity</p></div></div></div></div>
<div class="slide" style="background:linear-gradient(135deg,#0284c7,#0c4a6e)"><div class="pad" style="justify-content:center"><h1>Stay on course.</h1><p class="sub">Focus the next sprint on signal quality.</p></div></div>
</div></body></html>
