      :root {

      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 36px 0 56px;
        background: #11131a;
      }
      header {
        max-width: 1120px;
        margin: 0 auto 22px;
        padding: 0 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: #aeb4c2;
      }
      nav {
        max-width: 1120px;
        margin: 0 auto 28px;
        padding: 0 24px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      nav a {
        color: #f4f4f6;
        text-decoration: none;
        border: 1px solid #343946;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        background: #1a1d26;
      }
      .deck {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 24px;
        display: grid;
        gap: 28px;
      }
      .slide-wrap {
        margin: 0;
      }
      .slide {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        overflow: hidden;
        container-type: size;
        background: #fff;
        box-shadow: 0 18px 52px rgba(0, 0, 0, 0.42);
      }
      figcaption {
        margin-top: 8px;
        color: #aeb4c2;
        font-size: 13px;
      }
      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-size: 1.8cqh;
        color: rgba(255, 255, 255, 0.72);
        background: repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.08) 0 8px,
          rgba(255, 255, 255, 0.02) 8px 16px
        );
      }
      table {
        width: 100%;
        height: 100%;
        border-collapse: collapse;
        font-size: 1.9cqh;
      }
      th,
      td {
        border: 1px solid currentColor;
        padding: 0.75cqh 1cqw;
        text-align: left;
        vertical-align: top;
      }
      th {
        font-weight: 700;
      }
      .grid {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 24px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        gap: 24px;
      }
      .card {
        text-decoration: none;
        color: inherit;
      }
      .card .slide {
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.4);
      }
      .card figcaption {
        display: none;
      }
      .card-meta {
        margin-top: 10px;
        font-size: 15px;
      }
      .card:hover .slide {
        outline: 2px solid #9db4ff;
      }
    </style>
