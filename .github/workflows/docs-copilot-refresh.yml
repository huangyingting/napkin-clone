name: Docs Copilot Refresh

on:
  # 02:00 UTC+8 == 18:00 UTC.
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-copilot-refresh
  cancel-in-progress: false

jobs:
  refresh-docs:
    name: Refresh docs with Copilot
    runs-on: ubuntu-latest
    env:
      DB_PROVIDER: sqlite
      DATABASE_URL: "file:./prisma/dev.db"
      AUTH_SECRET: ci-placeholder-secret-not-used-in-production
      COPILOT_ALLOW_ALL: "1"
      GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN || github.token }}
      COPILOT_PROMPT: |
        Update the repository documentation so it reflects the current code architecture.

        Requirements:
        - Follow AGENTS.md and the documentation rules in docs/README.md.
        - Treat source code, tests, and schemas as authoritative.
        - Keep docs organized as flat subsystem directories under docs/<subsystem>/.
        - Update docs/README.md and docs/system/subsystem-map.md when subsystem coverage changes.
        - Document current behavior only; do not add compatibility notes for superseded payload shapes.
        - Make documentation changes only. Do not edit application source, tests, package metadata, generated files, or workflow files.
        - When done, ensure npm run docs:check passes.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Copilot CLI is available
        run: |
          if ! command -v copilot >/dev/null 2>&1; then
            echo "The 'copilot' CLI command is not available on this runner."
            echo "Install/configure Copilot CLI for this workflow, or run it on a runner image that provides it."
            exit 1
          fi

      - name: Ask Copilot to refresh docs
        run: |
          copilot --allow-all-tools -p "$COPILOT_PROMPT" 2>&1 | tee "$RUNNER_TEMP/copilot-docs-refresh.log"

      - name: Ensure only documentation files changed
        run: |
          changed_files="$(git status --short | awk '{print $2}')"
          if [ -z "$changed_files" ]; then
            echo "No documentation changes produced."
            exit 0
          fi

          disallowed="$(printf '%s\n' "$changed_files" | grep -Ev '^(docs/|README\.md|AGENTS\.md)$' || true)"
          if [ -n "$disallowed" ]; then
            echo "Copilot changed files outside the allowed documentation set:"
            printf '%s\n' "$disallowed"
            exit 1
          fi

      - name: Format docs
        run: npx prettier --write "docs/**/*.md" README.md AGENTS.md

      - name: Verify docs
        run: npm run docs:check

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: chore/copilot-docs-refresh
          delete-branch: true
          commit-message: "docs: refresh architecture documentation"
          title: "docs: refresh architecture documentation"
          body: |
            Automated documentation refresh generated by the scheduled Copilot CLI workflow.

            Schedule: daily at 02:00 UTC+8 (`0 18 * * *` UTC).

            Verification:
            - `npm run docs:check`
